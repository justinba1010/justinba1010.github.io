<!-- Mermaid diagram rendering -->
<!-- Renders fenced ```mermaid code blocks as diagrams. Mermaid.js is only
     fetched when a page actually contains a diagram. -->
<script type="module">
  document.addEventListener("DOMContentLoaded", async () => {
    // kramdown + rouge renders ```mermaid as
    // <div class="language-mermaid ..."><div class="highlight"><pre><code>...</code></pre></div></div>
    // Grab the raw text and swap in a <pre class="mermaid"> element for mermaid to process.
    const wrappers = document.querySelectorAll(".language-mermaid");
    if (!wrappers.length) return;

    const nodes = [];
    wrappers.forEach((wrapper) => {
      const code = wrapper.querySelector("code") || wrapper;
      const pre = document.createElement("pre");
      pre.className = "mermaid";
      pre.textContent = code.textContent;
      wrapper.replaceWith(pre);
      nodes.push(pre);
    });

    const { default: mermaid } = await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs");
    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });

    try {
      await mermaid.run({ nodes });
    } catch (e) {
      console.error("Mermaid render failed:", e);
    }
  });
</script>
